<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just Construction - Job Post Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--jc-black:#0a0a0a;--jc-dark:#111;--jc-card:#141414;--jc-border:#2a2a2a;--jc-red:#FF004A;--jc-red-dim:rgba(255,0,74,.15);--jc-white:#fff;--jc-grey:#888;--jc-light-grey:#ccc;--jc-muted:#555}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',system-ui,sans-serif;background:var(--jc-black);color:var(--jc-white);min-height:100vh;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(180deg,var(--jc-dark),var(--jc-black));border-bottom:3px solid var(--jc-red);padding:20px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header img{height:38px}.header-text{font-size:20px;font-weight:700;letter-spacing:1px}.header-sub{font-size:14px;color:var(--jc-grey);margin-top:2px}
.main{max-width:740px;margin:0 auto;padding:24px 20px 100px}
.section-label{font-size:14px;font-weight:700;letter-spacing:3px;color:var(--jc-red);margin:36px 0 16px}
.field{margin-bottom:18px}.field label{display:block;font-size:16px;font-weight:600;color:#aaa;margin-bottom:6px}.field .req{color:var(--jc-red)}
.field input,.field select,.field textarea{width:100%;padding:14px 16px;background:var(--jc-card);border:1px solid var(--jc-border);border-radius:8px;color:var(--jc-white);font-size:17px;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--jc-red)}
.field select{appearance:none;cursor:pointer}.field textarea{min-height:110px;resize:vertical;line-height:1.5}.field .hint{font-size:14px;color:var(--jc-muted);margin-top:5px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:560px){.row-2,.row-3{grid-template-columns:1fr}}
.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{padding:10px 18px;border-radius:22px;border:1px solid var(--jc-border);background:var(--jc-card);color:var(--jc-grey);font-size:15px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:hover{border-color:#444}.chip.active{border-color:var(--jc-red);background:var(--jc-red-dim);color:var(--jc-red)}
.custom-sp{display:flex;gap:8px;margin-top:12px}.custom-sp input{flex:1}
.btn-primary{width:100%;padding:18px;background:var(--jc-red);color:#fff;border:none;border-radius:8px;font-size:17px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:inherit;margin-top:28px;transition:opacity .2s,transform .1s}
.btn-primary:hover{opacity:.9}.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-outline{padding:14px 24px;background:transparent;color:var(--jc-red);border:2px solid var(--jc-red);border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-outline:hover{background:var(--jc-red-dim)}
.btn-solid{padding:14px 24px;background:var(--jc-red);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-solid:hover{opacity:.9}
.validation-msg{text-align:center;font-size:14px;color:var(--jc-red);margin-top:8px}
.preview-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.preview-bar .meta{color:var(--jc-muted);font-size:14px}
.preview-card{background:var(--jc-dark);border-radius:12px;padding:20px;margin-bottom:20px}
.caption-box{background:var(--jc-card);border:1px solid var(--jc-border);border-radius:8px;padding:16px;white-space:pre-wrap;font-size:16px;line-height:1.7;color:var(--jc-light-grey)}
.canvas-wrap{text-align:center}.canvas-wrap canvas{max-width:100%;height:auto;border-radius:8px}
.action-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.style-tabs{display:flex;gap:0;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid var(--jc-border)}
.style-tab{flex:1;padding:16px 8px;text-align:center;background:var(--jc-card);color:var(--jc-grey);font-size:15px;font-weight:600;font-family:inherit;border:none;cursor:pointer;transition:all .2s;border-right:1px solid var(--jc-border)}
.style-tab:last-child{border-right:none}.style-tab.active{background:var(--jc-red);color:#fff}.style-tab:hover:not(.active){background:#1a1a1a}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--jc-red);color:#fff;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;opacity:0;transition:all .3s ease;pointer-events:none;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.hidden{display:none!important}
</style>
</head>

function addCSP(){const i=document.getElementById("customSP"),v=i.value.trim();if(!v)return;selectedSPs.push(v);const b=document.createElement("button");b.className="chip active";b.textContent=v;b.addEventListener("click",()=>{if(selectedSPs.includes(v)){selectedSPs=selectedSPs.filter(s=>s!==v);b.classList.remove("active")}else{selectedSPs.push(v);b.classList.add("active")}});spC.appendChild(b);i.value=""}

// Market chips
document.querySelectorAll("#marketChips .chip").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll("#marketChips .chip").forEach(x=>x.classList.remove("active"));b.classList.add("active");selectedMarket=b.dataset.val})});

// Validation
["jobTitle","division","location"].forEach(id=>{const el=document.getElementById(id);el.addEventListener("input",chk);el.addEventListener("change",chk)});
function chk(){const v=["jobTitle","division","location"].every(id=>document.getElementById(id).value.trim());document.getElementById("generateBtn").disabled=!v;document.getElementById("validationMsg").classList.toggle("hidden",v)}
chk();

// Nav
document.querySelectorAll(".style-tab").forEach(t=>{t.addEventListener("click",()=>{document.querySelectorAll(".style-tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");currentStyle=t.dataset.style;drawGraphic(getFormData(),currentStyle)})});
document.getElementById("generateBtn").addEventListener("click",generate);
document.getElementById("backBtn").addEventListener("click",goBack);
document.getElementById("backBtn2").addEventListener("click",goBack);
document.getElementById("downloadBtn").addEventListener("click",download);
document.getElementById("copyBtn").addEventListener("click",copyCaption);

function goBack(){document.getElementById("previewView").classList.add("hidden");document.getElementById("formView").classList.remove("hidden");window.scrollTo(0,0)}

function getFormData(){return{jobTitle:document.getElementById("jobTitle").value.trim(),division:document.getElementById("division").value,location:document.getElementById("location").value.trim(),contractType:document.getElementById("contractType").value,salaryFrom:document.getElementById("salaryFrom").value,salaryTo:document.getElementById("salaryTo").value,currency:document.getElementById("currency").value,keyRequirements:document.getElementById("keyRequirements").value,sellingPoints:[...selectedSPs],consultantName:document.getElementById("consultantName").value.trim(),contactEmail:document.getElementById("contactEmail").value.trim(),contactPhone:document.getElementById("contactPhone").value.trim()}}

function generate(){const d=getFormData();document.getElementById("captionBox").textContent=buildCaption(d);document.getElementById("previewMeta").textContent=d.jobTitle+" | "+d.location;document.getElementById("formView").classList.add("hidden");document.getElementById("previewView").classList.remove("hidden");window.scrollTo(0,0);currentStyle="photo";document.querySelectorAll(".style-tab").forEach(x=>x.classList.remove("active"));document.querySelector("[data-style=photo]").classList.add("active");setTimeout(()=>drawGraphic(d,"photo"),80)}

function sym(d){return d.currency==="GBP"?"\u00A3":"$"}
function salaryStr(d){const s=sym(d);if(d.salaryFrom&&d.salaryTo)return s+parseInt(d.salaryFrom).toLocaleString()+" - "+s+parseInt(d.salaryTo).toLocaleString();if(d.salaryFrom)return"Up to "+s+parseInt(d.salaryFrom).toLocaleString();return""}
function getReqs(d){return d.keyRequirements.split("\n").map(r=>r.trim()).filter(Boolean)}

// === CAPTION ===
function buildCaption(d){
  const reqs=getReqs(d);
  const hooks=["This one won't stay open long.","If this sounds like you, let's talk.","The right person will know exactly why this role is special.","We've placed 3 people with this client already. They keep coming back for a reason.","Roles like this don't come around often.","One of the strongest packages we've seen this quarter."];
  const hook=hooks[Math.floor(Math.random()*hooks.length)];
  let c=d.jobTitle.toUpperCase()+" | "+d.location+"\n"+d.division+" | "+d.contractType+"\n\n"+hook+"\n\n";
  if(salaryStr(d))c+="Package: "+salaryStr(d)+"\n\n";
  if(reqs.length){c+="Here's what our client is looking for:\n";reqs.forEach(r=>c+="\u25AA "+r+"\n");c+="\n"}
  if(d.sellingPoints.length){c+="Why this role stands out:\n";d.sellingPoints.forEach(sp=>c+="\u2714\uFE0F "+sp+"\n");c+="\n"}
  c+="Know someone who fits? Tag them below.\nWant to apply? Drop "+(d.consultantName||"us")+" a DM or hit apply.\n\n";
  c+="#ConstructionJobs #Hiring #JustConstruction #Recruitment";
  if(d.division)c+=" #"+d.division.replace(/[^a-zA-Z]/g,"");
  return c;
}

// === DRAWING ===
function drawGraphic(d,style){
  const canvas=document.getElementById("postCanvas");const ctx=canvas.getContext("2d");
  canvas.width=W;canvas.height=H;
  if(style==="photo")drawPhoto(ctx,d);
  else if(style==="infographic")drawInfo(ctx,d);
  else drawMinimal(ctx,d);
}

// --- Shared helpers ---
function wrapText(ctx,text,maxW){const words=text.split(" ");const lines=[];let cur="";words.forEach(w=>{const t=cur?cur+" "+w:w;if(ctx.measureText(t).width<=maxW)cur=t;else{if(cur)lines.push(cur);cur=w}});if(cur)lines.push(cur);return lines}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

function drawLogo(ctx){
  const logo=new Image();logo.src=LOGO_B64;
  logo.onload=()=>{const lh=40,lw=(logo.width/logo.height)*lh;ctx.drawImage(logo,60,50,lw,lh)};
}

function drawCTA(ctx,d){
  const y=H-CTA_H;
  ctx.fillStyle="#FF004A";ctx.fillRect(0,y,W,CTA_H);
  ctx.fillStyle="#fff";ctx.font="bold 34px Montserrat";ctx.textAlign="left";ctx.fillText("APPLY NOW",60,y+45);
  ctx.font="400 22px Montserrat";
  if(d.consultantName)ctx.fillText("Contact: "+d.consultantName,60,y+78);
  if(d.contactEmail)ctx.fillText(d.contactEmail,60,y+108);
  ctx.font="400 18px Montserrat";ctx.fillStyle="rgba(255,255,255,.7)";ctx.textAlign="right";
  ctx.fillText("just-constructionrec.com",W-60,y+108);ctx.textAlign="left";
}

// Content area = from top to CTA
const CONTENT_BOTTOM=H-CTA_H-20;

// --- STYLE 1: PHOTO OVERLAY ---
function drawPhoto(ctx,d){
  // BG first
  ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,W,H);

  const folder=DIV_FOLDERS[d.division]||"general-contracting";
  const num=Math.floor(Math.random()*6)+1;
  const img=new Image();
  img.crossOrigin="anonymous";
  img.src="images/"+folder+"/"+num+".jpg";

  img.onload=()=>{
    ctx.drawImage(img,0,0,W,H);
    // Dark overlay
    ctx.fillStyle="rgba(10,10,10,0.72)";ctx.fillRect(0,0,W,H);
    // Red bar
    ctx.fillStyle="#FF004A";ctx.fillRect(0,0,W,8);
    drawLogo(ctx);
    drawPhotoContent(ctx,d);
    drawCTA(ctx,d);
  };
  img.onerror=()=>{
    // Fallback gradient
    const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,"#1a1a2e");grd.addColorStop(1,"#0f0f0f");
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#FF004A";ctx.fillRect(0,0,W,8);
    drawLogo(ctx);drawPhotoContent(ctx,d);drawCTA(ctx,d);
  };
}

function drawPhotoContent(ctx,d){
  let y=160;
  ctx.fillStyle="#FF004A";ctx.font="bold 28px Montserrat";ctx.fillText("WE'RE HIRING",60,y);y+=65;
  ctx.fillStyle="#fff";ctx.font="900 64px Montserrat";
  wrapText(ctx,(d.jobTitle||"JOB TITLE").toUpperCase(),W-120).forEach(line=>{ctx.fillText(line,60,y);y+=74});
  y+=20;
  ctx.fillStyle="#FF004A";ctx.fillRect(60,y,120,5);y+=45;

  // Pills
  const pills=[];
  if(d.location)pills.push("\uD83D\uDCCD  "+d.location);
  if(d.contractType)pills.push("\uD83D\uDCCB  "+d.contractType);
  if(d.division)pills.push("\u2699\uFE0F  "+d.division);
  if(salaryStr(d))pills.push("\uD83D\uDCB0  "+salaryStr(d));
  ctx.font="600 28px Montserrat";
  pills.forEach(p=>{const tw=ctx.measureText(p).width;ctx.fillStyle="rgba(255,255,255,.1)";roundRect(ctx,60,y-30,tw+40,52,10);ctx.fill();ctx.fillStyle="#fff";ctx.fillText(p,80,y);y+=62});
  y+=20;

  // Reqs
  const reqs=getReqs(d);
  const maxY=CONTENT_BOTTOM-(d.sellingPoints.length?d.sellingPoints.slice(0,4).length*42+60:0);
  if(reqs.length){
    ctx.fillStyle="#FF004A";ctx.font="bold 26px Montserrat";ctx.fillText("KEY REQUIREMENTS",60,y);y+=42;
    ctx.font="400 24px Montserrat";ctx.fillStyle="#ddd";
    reqs.slice(0,5).forEach(r=>{if(y>maxY-36)return;const lines=wrapText(ctx,"\u25B8  "+r,W-140);lines.forEach(l=>{if(y>maxY-36)return;ctx.fillText(l,70,y);y+=34});y+=6});
    y+=16;
  }

  // SPs
  if(d.sellingPoints.length&&y<CONTENT_BOTTOM-50){
    ctx.fillStyle="#FF004A";ctx.font="bold 26px Montserrat";ctx.fillText("WHAT'S ON OFFER",60,y);y+=42;
    ctx.font="400 24px Montserrat";ctx.fillStyle="#ddd";
    d.sellingPoints.slice(0,4).forEach(sp=>{if(y>CONTENT_BOTTOM-10)return;ctx.fillText("\u2714  "+sp,70,y);y+=38});
  }
}

// --- STYLE 2: INFOGRAPHIC ---
function drawInfo(ctx,d){
  ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,W,H);
  ctx.fillStyle="#FF004A";ctx.fillRect(0,0,W,8);
  drawLogo(ctx);

  let y=140;
  // Division tag
  ctx.fillStyle="#FF004A";ctx.font="bold 20px Montserrat";ctx.fillText(d.division?d.division.toUpperCase():"",60,y);y+=40;

  // Job title
  ctx.fillStyle="#fff";ctx.font="800 52px Montserrat";
  wrapText(ctx,(d.jobTitle||"JOB TITLE").toUpperCase(),W-120).forEach(line=>{ctx.fillText(line,60,y);y+=62});
  y+=18;
  ctx.fillStyle="#FF004A";ctx.fillRect(60,y,W-120,4);y+=32;

  // Dashboard cards - 2x2 grid
  const cardW=(W-140)/2,cardH=120,gap=20;
  const cards=[
    {label:"SALARY",value:salaryStr(d)||"Competitive",big:true},
    {label:"CONTRACT",value:d.contractType||"Permanent",big:false},
    {label:"LOCATION",value:d.location||"",big:false},
    {label:"DIVISION",value:d.division||"",big:false}
  ];

  for(let i=0;i<cards.length;i++){
    const col=i%2,row=Math.floor(i/2);
    const cx=60+col*(cardW+gap),cy=y+row*(cardH+gap);
    ctx.fillStyle="#161616";roundRect(ctx,cx,cy,cardW,cardH,10);ctx.fill();
    ctx.strokeStyle="#222";ctx.lineWidth=1;roundRect(ctx,cx,cy,cardW,cardH,10);ctx.stroke();
    ctx.fillStyle="#FF004A";ctx.font="bold 16px Montserrat";ctx.fillText(cards[i].label,cx+20,cy+32);
    ctx.fillStyle="#fff";ctx.font=cards[i].big?"700 30px Montserrat":"600 24px Montserrat";
    const valLines=wrapText(ctx,cards[i].value,cardW-40);
    valLines.slice(0,2).forEach((l,j)=>{ctx.fillText(l,cx+20,cy+66+j*30)});
  }
  y+=2*(cardH+gap)+24;

  // Reqs section
  const reqs=getReqs(d);
  const spCount=d.sellingPoints.length;
  const maxReqY=CONTENT_BOTTOM-(spCount?Math.min(spCount,4)*40+60:0);

  if(reqs.length&&y<maxReqY-36){
    ctx.fillStyle="#FF004A";ctx.font="bold 24px Montserrat";ctx.fillText("KEY REQUIREMENTS",60,y);y+=38;
    ctx.font="400 22px Montserrat";ctx.fillStyle="#ccc";
    reqs.slice(0,5).forEach(r=>{if(y>maxReqY-32)return;const lines=wrapText(ctx,"\u25B8  "+r,W-140);lines.forEach(l=>{if(y>maxReqY-32)return;ctx.fillText(l,70,y);y+=30});y+=6});
    y+=16;
  }

  // Benefits cards - horizontal chips
  if(spCount&&y<CONTENT_BOTTOM-50){
    ctx.fillStyle="#FF004A";ctx.font="bold 24px Montserrat";ctx.fillText("WHAT'S ON OFFER",60,y);y+=40;
    ctx.font="500 21px Montserrat";
    let chipX=60;
    d.sellingPoints.slice(0,4).forEach(sp=>{
      const tw=ctx.measureText("\u2714 "+sp).width;
      if(chipX+tw+32>W-60){chipX=60;y+=48}
      if(y>CONTENT_BOTTOM-10)return;
      ctx.fillStyle="#1a1a1a";roundRect(ctx,chipX,y-24,tw+28,40,8);ctx.fill();
      ctx.strokeStyle="#FF004A";ctx.lineWidth=1;roundRect(ctx,chipX,y-24,tw+28,40,8);ctx.stroke();
      ctx.fillStyle="#ddd";ctx.fillText("\u2714 "+sp,chipX+14,y);
      chipX+=tw+42;
    });
  }

  drawCTA(ctx,d);
}

// --- STYLE 3: CLEAN & SIMPLE ---
function drawMinimal(ctx,d){
  ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,W,H);
  // Left accent
  ctx.fillStyle="#FF004A";ctx.fillRect(0,0,5,H);
  ctx.fillRect(0,0,W,8);
  drawLogo(ctx);

  let y=150;
  if(d.division){ctx.fillStyle="#FF004A";ctx.font="700 22px Montserrat";ctx.fillText(d.division.toUpperCase(),60,y);y+=50}

  // Big title
  ctx.fillStyle="#fff";ctx.font="800 62px Montserrat";
  wrapText(ctx,(d.jobTitle||"JOB TITLE").toUpperCase(),W-120).forEach(line=>{ctx.fillText(line,60,y);y+=72});
  y+=25;

  // Location & contract on one line
  ctx.font="500 28px Montserrat";ctx.fillStyle="#999";
  let infoLine=d.location||"";
  if(d.contractType)infoLine+=(infoLine?"  |  ":"")+d.contractType;
  ctx.fillText(infoLine,60,y);y+=50;

  // Salary - prominent
  if(salaryStr(d)){ctx.fillStyle="#fff";ctx.font="700 42px Montserrat";ctx.fillText(salaryStr(d),60,y);y+=65}
  else y+=10;

  // Line
  ctx.fillStyle="#FF004A";ctx.fillRect(60,y,100,4);y+=45;

  // Reqs
  const reqs=getReqs(d);
  const spCount=d.sellingPoints.length;
  const maxReqY=CONTENT_BOTTOM-(spCount?Math.min(spCount,4)*40+60:0);

  if(reqs.length){
    ctx.fillStyle="#FF004A";ctx.font="bold 24px Montserrat";ctx.fillText("KEY REQUIREMENTS",60,y);y+=38;
    ctx.font="400 24px Montserrat";ctx.fillStyle="#aaa";
    reqs.slice(0,5).forEach(r=>{if(y>maxReqY-34)return;const lines=wrapText(ctx,"\u25B8  "+r,W-140);lines.forEach(l=>{if(y>maxReqY-34)return;ctx.fillText(l,70,y);y+=34});y+=6});
    y+=18;
  }

  // SPs
  if(spCount&&y<CONTENT_BOTTOM-50){
    ctx.fillStyle="#FF004A";ctx.font="bold 24px Montserrat";ctx.fillText("WHAT'S ON OFFER",60,y);y+=38;
    ctx.font="400 24px Montserrat";ctx.fillStyle="#aaa";
    d.sellingPoints.slice(0,4).forEach(sp=>{if(y>CONTENT_BOTTOM-10)return;ctx.fillText("\u2714  "+sp,70,y);y+=38});
  }

  drawCTA(ctx,d);
}

// === ACTIONS ===
function download(){const c=document.getElementById("postCanvas"),d=getFormData();const names={photo:"Photo",infographic:"Info",minimal:"Clean"};const a=document.createElement("a");a.download="JC_"+(d.jobTitle.replace(/\s+/g,"_")||"Job")+"_"+(names[currentStyle]||"")+".png";a.href=c.toDataURL("image/png");a.click();showToast("Image downloaded")}
function copyCaption(){const t=document.getElementById("captionBox").textContent;navigator.clipboard.writeText(t).then(()=>showToast("Caption copied")).catch(()=>{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("Caption copied")})}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000)}
</script>
